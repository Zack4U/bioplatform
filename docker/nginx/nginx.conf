# ===========================================
# BioPlatform - Nginx Configuration
# Reverse Proxy / API Gateway
# ===========================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # Upstream services
    upstream backend_core {
        server backend-core:5000;
        keepalive 32;
    }

    upstream ai_service {
        server ai-service:8000;
        keepalive 16;
    }

    upstream frontend_web {
        server frontend-web:3000;
        keepalive 16;
    }

    # ===========================================
    # HTTP Server (Redirect to HTTPS in production)
    # ===========================================
    server {
        listen 80;
        server_name localhost bioplatform.local;

        # For local development, proxy directly
        # In production, redirect to HTTPS
        # return 301 https://$server_name$request_uri;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ===========================================
        # API Gateway Routes
        # ===========================================

        # Backend .NET Core API
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://backend_core/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
            proxy_connect_timeout 90s;
        }

        # Swagger UI for Core API
        location /swagger {
            proxy_pass http://backend_core/swagger;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # AI Service API
        location /ai/ {
            limit_req zone=api_limit burst=10 nodelay;
            
            proxy_pass http://ai_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;  # Longer timeout for AI processing
            proxy_connect_timeout 60s;
            
            # Allow larger uploads for image classification
            client_max_body_size 10M;
        }

        # AI Service Docs
        location /ai/docs {
            proxy_pass http://ai_service/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Authentication endpoints (stricter rate limit)
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            
            proxy_pass http://backend_core/api/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ===========================================
        # Frontend Application
        # ===========================================

        # Next.js Frontend
        location / {
            proxy_pass http://frontend_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        # Next.js HMR (Hot Module Replacement) for development
        location /_next/webpack-hmr {
            proxy_pass http://frontend_web/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static files caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_pass http://frontend_web;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ===========================================
    # HTTPS Server (Production)
    # ===========================================
    # Uncomment for production with SSL certificates
    
    # server {
    #     listen 443 ssl http2;
    #     server_name bioplatform.co www.bioplatform.co;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:50m;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Same location blocks as HTTP server above...
    # }
}

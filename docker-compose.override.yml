# ===========================================
# BioPlatform - Docker Compose Override (Development)
# ===========================================
# Este archivo se carga automáticamente junto con docker-compose.yml
# Agrega herramientas UI para gestionar la infraestructura en desarrollo

version: "3.8"

services:
  # Adminer - UI para SQL Server y PostgreSQL
  adminer:
    image: adminer:latest
    container_name: bioplatform-adminer
    ports:
      - "8090:8080"
    networks:
      - bioplatform-network
    depends_on:
      - sqlserver
      - postgres

  # pgAdmin - UI específica para PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bioplatform-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@bioplatform.local
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "5050:80"
    networks:
      - bioplatform-network
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Seq - Logging centralizado (Serilog)
  seq:
    image: datalust/seq:latest
    container_name: bioplatform-seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"
    networks:
      - bioplatform-network
    volumes:
      - seq_data:/data

volumes:
  pgadmin_data:
  seq_data:

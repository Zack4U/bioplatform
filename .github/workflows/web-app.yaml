name: Frontend Web (Next.js) CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'src/Bio.Frontend.Web/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'src/Bio.Frontend.Web/**'

jobs:
  build:
    name: Lint, Type-Check and Build Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/Bio.Frontend.Web

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './src/Bio.Frontend.Web/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint (Zero Warnings Policy)
      run: npx eslint . --max-warnings=0

    - name: Type Check (TypeScript)
      run: npx tsc --noEmit

    - name: Build Next.js
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1

# ===========================================
# BioPlatform Caldas - Docker Compose
# ===========================================
# Uso:
#   docker-compose up -d --build     (Desarrollo)
#   docker-compose -f docker-compose.yml up -d  (Producción)

version: "3.8"

services:
  # ===========================================
  # BASES DE DATOS
  # ===========================================

  # SQL Server - Transacciones, Identity, Marketplace
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bioplatform-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_SQL_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./docker/sqlserver/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bioplatform-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  # PostgreSQL - Catálogo científico, GIS, AI Metadata
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bioplatform-postgres
    environment:
      - POSTGRES_USER=${DB_PG_USER}
      - POSTGRES_PASSWORD=${DB_PG_PASSWORD}
      - POSTGRES_DB=${DB_PG_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bioplatform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_PG_USER} -d ${DB_PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Caché
  redis:
    image: redis:7-alpine
    container_name: bioplatform-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bioplatform-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - Logs (Opcional)
  mongodb:
    image: mongo:7
    container_name: bioplatform-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bioplatform-network
    profiles:
      - full # Solo se levanta con: docker-compose --profile full up

  # ===========================================
  # BACKEND SERVICES
  # ===========================================

  # Backend .NET Core API
  backend-core:
    build:
      context: ./src/Bio.Backend.Core
      dockerfile: Dockerfile
    container_name: bioplatform-backend-core
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__SqlServer=${DB_CONNECTION_STRING_SQL}
      - ConnectionStrings__PostgreSQL=${DB_CONNECTION_STRING_PG}
      - ConnectionStrings__Redis=${REDIS_CONNECTION_STRING}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpirationMinutes=${JWT_EXPIRATION_MINUTES}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bioplatform-network
    volumes:
      - ./src/Bio.Backend.Core:/app
    restart: unless-stopped

  # Backend AI - FastAPI (Python)
  ai-service:
    build:
      context: ./src/Bio.Backend.AI
      dockerfile: Dockerfile
    container_name: bioplatform-ai-service
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${DB_PG_USER}:${DB_PG_PASSWORD}@postgres:5432/${DB_PG_DATABASE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bioplatform-network
    volumes:
      - ./src/Bio.Backend.AI:/app
      - ai_models:/app/data/models_weights
      - ai_vectorstore:/app/data/vector_store
    restart: unless-stopped

  # ChromaDB - Vector Store para RAG
  chromadb:
    image: chromadb/chroma:latest
    container_name: bioplatform-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - bioplatform-network
    environment:
      - ANONYMIZED_TELEMETRY=false

  # ===========================================
  # FRONTEND SERVICES
  # ===========================================

  # Frontend Web - Next.js
  frontend-web:
    build:
      context: ./src/Bio.Frontend.Web
      dockerfile: Dockerfile
    container_name: bioplatform-frontend-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_AI_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend-core
      - ai-service
    networks:
      - bioplatform-network
    volumes:
      - ./src/Bio.Frontend.Web:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  # ===========================================
  # GATEWAY / REVERSE PROXY
  # ===========================================

  nginx:
    image: nginx:alpine
    container_name: bioplatform-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend-core
      - ai-service
      - frontend-web
    networks:
      - bioplatform-network
    restart: unless-stopped
    profiles:
      - production

# ===========================================
# NETWORKS
# ===========================================
networks:
  bioplatform-network:
    driver: bridge

# ===========================================
# VOLUMES
# ===========================================
volumes:
  sqlserver_data:
  postgres_data:
  redis_data:
  mongodb_data:
  chroma_data:
  ai_models:
  ai_vectorstore:
